name: Boundary Hardening

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional PR number to post boundary summary comment"
        required: false
        default: ""
        type: string
      pr_comment_bot_login:
        description: "Bot login to match for comment upsert"
        required: false
        default: "github-actions[bot]"
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  boundary-hardening:
    # Requires a runner image with c3c + runtime deps installed.
    # Keep this on self-hosted to avoid fragile per-run toolchain bootstrapping.
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run boundary-hardening profile
        env:
          OMNI_BOUNDARY_ENABLE_FIBER_TEMP: "1"
          OMNI_BOUNDARY_ENABLE_AFFINITY_HARNESS: "1"
          OMNI_BOUNDARY_SUMMARY: "1"
          OMNI_BOUNDARY_ASSERT_SUMMARY: "1"
          OMNI_BOUNDARY_EMIT_JSON: "1"
          OMNI_BOUNDARY_QUIET: "1"
        run: scripts/run_boundary_hardening.sh

      - name: Build boundary summary markdown
        if: always()
        run: |
          scripts/emit_boundary_job_summary.sh \
            build/boundary_hardening_normal.log \
            build/boundary_hardening_asan.log > build/boundary_hardening_job_summary.md

      - name: Upload boundary-hardening artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boundary-hardening-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            build/boundary_hardening_normal.log
            build/boundary_hardening_asan.log
            build/boundary_hardening_summary.json
            build/boundary_hardening_job_summary.md

      - name: Publish boundary summary to job summary
        if: always()
        run: cat build/boundary_hardening_job_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment boundary summary on PR
        if: ${{ always() && github.event.inputs.pr_number != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number('${{ github.event.inputs.pr_number }}');
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed(`Invalid pr_number input: '${{ github.event.inputs.pr_number }}'`);
              return;
            }
            try {
              await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prNumber
              });
            } catch (err) {
              core.notice(`Skipping boundary PR comment: #${prNumber} is not a PR in ${owner}/${repo}.`);
              return;
            }
            const marker = '<!-- omni-boundary-hardening-summary -->';
            const expectedBotLogin = '${{ github.event.inputs.pr_comment_bot_login }}' || 'github-actions[bot]';
            const summary = fs.readFileSync('build/boundary_hardening_job_summary.md', 'utf8');
            const body = [
              marker,
              'Boundary hardening profile completed.',
              '',
              summary,
              '',
              `Workflow run: https://github.com/${owner}/${repo}/actions/runs/${context.runId}`
            ].join('\n');
            let existing = null;
            for (let page = 1; page <= 10; page++) {
              const { data: comments } = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number: prNumber,
                per_page: 100,
                page
              });
              if (!comments || comments.length === 0) break;
              const found = [...comments].reverse().find((c) =>
                c?.user?.type === 'Bot' &&
                c?.user?.login === expectedBotLogin &&
                typeof c.body === 'string' &&
                c.body.includes(marker)
              );
              if (found) {
                existing = found;
                break;
              }
              if (comments.length < 100) break;
            }
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body
              });
            }
