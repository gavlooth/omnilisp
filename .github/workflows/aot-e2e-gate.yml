name: AOT E2E Gate

on:
  pull_request:
    paths:
      - "src/**"
      - "csrc/**"
      - "scripts/run_e2e.sh"
      - "scripts/build_omni_chelpers.sh"
      - "project.json"
      - "test_simple.omni"
      - ".github/workflows/aot-e2e-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  aot-e2e-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static dependencies
        run: deps/build_static.sh

      - name: Build validation image
        run: OMNI_VALIDATION_IMAGE=omni-validation-ci scripts/build_validation_image.sh

      - name: AOT and E2E compile gate
        run: |
          OMNI_VALIDATION_IMAGE=omni-validation-ci \
            scripts/run_validation_container.sh \
              bash -lc '
                set -euo pipefail
                scripts/build_omni_chelpers.sh
                c3c build
                LD_LIBRARY_PATH=/usr/local/lib ./build/main --build test_simple.omni -o build/test_simple_aot
                output="$(LD_LIBRARY_PATH=/usr/local/lib ./build/test_simple_aot)"
                echo "$output"
                test "$output" = "\"hello world\""
                OMNI_E2E_COMPILE_ONLY=1 scripts/run_e2e.sh
              '
